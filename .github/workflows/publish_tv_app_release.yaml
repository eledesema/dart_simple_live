name: app-build-action
# 推送Tag或手动触发
on:
  workflow_dispatch: # 【修改点 1】：添加手动编译按钮
  push:
    tags:
      - "tv_*"
jobs:
  build-tv:
    runs-on: macos-latest
    permissions:
      contents: write
    steps:
      # 签出代码
      - uses: actions/checkout@v4
        with:
          ref: master

      # 【修改点 2】：删除了会报错的 Download Android keystore 和 Create key.properties
      
      # 自动生成临时 Android 签名 (解决 key.properties 缺失报错)
      - name: Create temporary Android keystore
        run: |
          keytool -genkey -v -keystore simple_live_app/android/app/test.jks -storepass 123456 -alias testkey -keypass 123456 -keyalg RSA -keysize 2048 -validity 10000 -dname "CN=Test,OU=Test,O=Test,L=Test,ST=Test,C=US"
          KEYSTORE_PATH=$(pwd)/simple_live_app/android/app/test.jks
          echo "storeFile=$KEYSTORE_PATH" > simple_live_app/android/key.properties
          echo "storePassword=123456" >> simple_live_app/android/key.properties
          echo "keyPassword=123456" >> simple_live_app/android/key.properties
          echo "keyAlias=testkey" >> simple_live_app/android/key.properties
          
      # 设置JAVA环境
      - uses: actions/setup-java@v4
        with:
          distribution: "zulu"
          java-version: "17"
          cache: "gradle"

      # 设置Flutter
      - name: Flutter action
        uses: subosito/flutter-action@v2
        with:
          flutter-version: "3.38.x"
          cache: true

      # 更新Flutter的packages
      - name: Restore packages
        run: |
          cd simple_live_tv_app
          flutter pub get

      # 打包APK
      - name: Build APK
        run: |
          cd simple_live_tv_app
          flutter build apk --release --split-per-abi

      # 上传APK至Artifacts
      - name: Upload APK to Artifacts
        uses: actions/upload-artifact@v4
        with:
          name: android_tv
          path: |
            simple_live_tv_app/build/app/outputs/flutter-apk/app-armeabi-v7a-release.apk
            simple_live_tv_app/build/app/outputs/flutter-apk/app-arm64-v8a-release.apk
            simple_live_tv_app/build/app/outputs/flutter-apk/app-x86_64-release.apk

      # 读取版本信息
      - name: Read version
        id: version
        uses: juliangruber/read-file-action@v1
        with:
          path: assets/tv_app_version.json
      - name: Echo version
        run: echo "${{ fromJson(steps.version.outputs.content).version }}"
      - name: Echo version content
        run: echo "${{ fromJson(steps.version.outputs.content).version_desc }}"

      # 上传至Release
      - name: Upload Release
        uses: softprops/action-gh-release@v1
        with:
          name: "${{ fromJson(steps.version.outputs.content).version }}"
          body: "# Android TV \n${{ fromJson(steps.version.outputs.content).version_desc }}"
          prerelease: ${{ fromJson(steps.version.outputs.content).prerelease }}
          token: ${{ secrets.GITHUB_TOKEN }}
          files: |
            simple_live_tv_app/build/app/outputs/flutter-apk/app-x86_64-release.apk
            simple_live_tv_app/build/app/outputs/flutter-apk/app-arm64-v8a-release.apk
            simple_live_tv_app/build/app/outputs/flutter-apk/app-armeabi-v7a-release.apk

      # 完成
      - run: echo "🍏 This job's status is ${{ job.status }}."
